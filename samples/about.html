<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About — {{ template_title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
            color: #111827;
        }
        .back {
            padding: 1rem 2rem;
            border-bottom: 1px solid #f3f4f6;
        }
        .back a {
            text-decoration: none;
            color: #6b7280;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            transition: color 0.15s;
        }
        .back a:hover { color: #111827; }
        .container {
            flex: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 3rem 2rem;
            width: 100%;
            text-align: center;
        }
        .container h1 { font-size: 2rem; margin-bottom: 1rem; }
        .container p { color: #6b7280; line-height: 1.7; margin-bottom: 1rem; max-width: 520px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>
    <div class="back">
        <a href="/">&larr; Back</a>
    </div>
    <div class="container">
        <h1>About Us</h1>
        <p>{{ template_description }}</p>
        <p>We are dedicated to building simple, effective solutions that make a difference. Our team focuses on quality and user experience in everything we create.</p>
    </div>
</body>
</html>
